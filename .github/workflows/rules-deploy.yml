name: Firestore rules deploy

on:
  push:
    branches:
      - main
    paths:
      - 'firestore/firestore.rules'

concurrency:
  group: rules-deploy
  cancel-in-progress: false

jobs:
  test:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: firestore/package-lock.json

      - name: Set up Java (required by Firebase emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Install rules-test deps
        working-directory: firestore
        run: npm ci

      - name: Run rules tests against emulator
        run: firebase emulators:exec --only firestore --project connect-me-rules-test "cd firestore && npm test"

  deploy:
    name: Deploy Firestore rules
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Verify FIREBASE_SERVICE_ACCOUNT secret is set
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not configured. See docs/operations/firebase-rules-deploy.md."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Write service account JSON to runner temp
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Write the secret to a temp file without echoing it.
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          chmod 600 "$RUNNER_TEMP/sa.json"

      - name: Deploy rules (rules-only)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: firebase deploy --only firestore:rules --project connect-me-e20b1 --non-interactive
